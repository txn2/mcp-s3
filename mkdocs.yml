site_name: txn2/mcp-s3
site_url: https://mcp-s3.txn2.com
site_description: Composable MCP server for Amazon S3 and S3-compatible object storage
site_author: Craig Johnston
repo_url: https://github.com/txn2/mcp-s3
repo_name: txn2/mcp-s3
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2025 - 2026 Craig Johnston / Deasil Works, Inc.

theme:
  name: material
  custom_dir: docs/overrides
  logo: images/logo.png
  favicon: images/logo.png
  palette:
    scheme: slate
  font: false
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - toc.follow
    - announce.dismiss

nav:
  - Home: index.md
  - Ecosystem: ecosystem/index.md
  - MCP Server:
    - Overview: server/index.md
    - Installation: server/installation.md
    - Configuration: server/configuration.md
    - Tools: server/tools.md
    - Multi-Server: server/multi-server.md
  - Go Library:
    - Overview: library/index.md
    - Quick Start: library/quickstart.md
    - Architecture: library/architecture.md
    - Extensibility: library/extensibility.md
  - Reference:
    - Overview: reference/index.md
    - Tools API: reference/tools-api.md
    - Configuration: reference/configuration.md
    - Security: reference/security.md
  - Support:
    - Troubleshooting: support/troubleshooting.md
    - Changelog: support/changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/txn2/mcp-s3
      name: mcp-s3 on GitHub
  generator: false

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: txn2
      repo: mcp-s3
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
